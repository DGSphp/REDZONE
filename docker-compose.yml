services:
  redzone:
    build: .
    image: redzone-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://redzone:secret@db:3306/redzone
      # - SMTP_USER=your_email@gmail.com
      # - SMTP_PASS=your_app_password
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8
    environment:
      - MYSQL_USER=redzone
      - MYSQL_PASSWORD=secret
      - MYSQL_DATABASE=redzone
      - MYSQL_ROOT_PASSWORD=secret
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
